# ~/.tmux.conf  (inside the proot Debian rootfs)
# Persistent multi-door session 'gordo' (Haven / Termux / SSH from a laptop)

# Mouse/touch ON — vital on a phone: scroll, pick a pane, resize with a finger
set -g mouse on

# Long history so you don't lose output (logs, builds)
set -g history-limit 50000

# Start windows/panes at 1 (easier on a phone keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Quick reload of this config:  prefix + r
bind r source-file ~/.tmux.conf \; display "config reloaded"

# More intuitive splits:  prefix + |  (vertical)   prefix + -  (horizontal)
bind | split-window -h
bind - split-window -v

# Clear colors / status bar so you always KNOW you're inside tmux
set -g default-terminal "screen-256color"
set -g status-style "bg=colour235,fg=colour250"
set -g status-left "#[bg=colour40,fg=black,bold] GORDO #[default] "
set -g status-left-length 20
set -g status-right "#[fg=colour40]#S #[fg=colour250]| %H:%M"
setw -g window-status-current-style "bg=colour40,fg=black,bold"

# Don't kill the session if you accidentally close the last window
set -g detach-on-destroy off
